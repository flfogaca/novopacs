<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registrar Achado Crítico - Themis Health</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: { extend: {
    colors: { "primary": "#0f66bd", "background-light": "#f6f7f8", "background-dark": "#101922" },
    fontFamily: { "display": ["Manrope", "sans-serif"] },
    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
  }}
}
</script>
<style>
body { font-family: 'Manrope', sans-serif; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-slate-900/60 backdrop-blur-sm font-display text-slate-900 antialiased min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden">
  <div class="h-1 bg-gradient-to-r from-red-500 to-orange-500"></div>

  <div class="p-6">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center">
        <span class="material-symbols-outlined text-red-600">warning</span>
      </div>
      <h2 class="text-lg font-bold text-slate-900">Registrar Achado Crítico</h2>
    </div>

    <form class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Exame</label>
        <input type="text" value="RM Crânio - Ana Silva" readonly
               class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm text-slate-600 cursor-not-allowed"/>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Severidade</label>
        <div class="flex gap-3">
          <label class="flex-1 relative cursor-pointer">
            <input type="radio" name="severidade" value="alta" checked class="peer sr-only"/>
            <div class="rounded-lg border-2 border-red-500 bg-red-50 px-4 py-3 text-center peer-checked:ring-2 peer-checked:ring-red-500/30 transition-all">
              <span class="text-sm font-bold text-red-700">Alta</span>
            </div>
          </label>
          <label class="flex-1 relative cursor-pointer">
            <input type="radio" name="severidade" value="media" class="peer sr-only"/>
            <div class="rounded-lg border-2 border-slate-200 px-4 py-3 text-center peer-checked:border-amber-500 peer-checked:bg-amber-50 peer-checked:ring-2 peer-checked:ring-amber-500/30 hover:border-amber-300 transition-all">
              <span class="text-sm font-bold text-slate-600 peer-checked:text-amber-700">Média</span>
            </div>
          </label>
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Descrição do Achado</label>
        <textarea rows="3" placeholder="Descreva o achado crítico identificado..."
                  class="w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 resize-none"></textarea>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Médico Solicitante a Notificar</label>
        <select class="w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm focus:border-primary focus:ring-2 focus:ring-primary/20">
          <option selected>Dr. Carlos Mendes</option>
          <option>Dra. Maria Oliveira</option>
          <option>Dr. Paulo Santos</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Método de Notificação</label>
        <div class="flex flex-wrap gap-4">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" checked class="rounded border-slate-300 text-primary focus:ring-primary/30"/>
            <span class="text-sm text-slate-700">Email</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" checked class="rounded border-slate-300 text-primary focus:ring-primary/30"/>
            <span class="text-sm text-slate-700">SMS</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="rounded border-slate-300 text-primary focus:ring-primary/30"/>
            <span class="text-sm text-slate-700">WhatsApp</span>
          </label>
        </div>
      </div>
    </form>
  </div>

  <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-slate-100 bg-slate-50/50">
    <button class="px-4 py-2.5 rounded-lg border border-slate-200 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">
      Cancelar
    </button>
    <button class="px-5 py-2.5 rounded-lg bg-red-600 text-sm font-semibold text-white hover:bg-red-700 transition-colors shadow-sm">
      Enviar Alerta
    </button>
  </div>
</div>

<script src="../../nav.js"></script>
</body>
</html>
