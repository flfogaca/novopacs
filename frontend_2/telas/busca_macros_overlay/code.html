<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Buscar Macros - Themis Health</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: { extend: {
    colors: { "primary": "#0f66bd", "background-light": "#f6f7f8", "background-dark": "#101922" },
    fontFamily: { "display": ["Manrope", "sans-serif"] },
    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
  }}
}
</script>
<style>
body { font-family: 'Manrope', sans-serif; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-slate-900/60 backdrop-blur-sm font-display text-slate-900 antialiased min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-2xl shadow-2xl w-full max-w-xl overflow-hidden">
  <div class="flex items-center gap-3 px-4 py-3 border-b border-slate-200">
    <span class="material-symbols-outlined text-slate-400">search</span>
    <input type="text" placeholder="Buscar macro ou frase padrão..." autofocus
           class="flex-1 border-0 bg-transparent text-sm placeholder:text-slate-400 focus:ring-0 p-0"/>
    <kbd class="hidden sm:inline-flex items-center px-2 py-0.5 rounded bg-slate-100 text-[11px] font-semibold text-slate-400 border border-slate-200">Esc</kbd>
  </div>

  <div class="max-h-96 overflow-y-auto divide-y divide-slate-100">
    <!-- Ressonância -->
    <div class="px-4 pt-3 pb-1">
      <span class="text-[11px] font-bold uppercase tracking-wider text-slate-400">Ressonância</span>
    </div>
    <button class="w-full text-left px-4 py-3 hover:bg-primary/5 transition-colors group">
      <div class="flex items-center justify-between">
        <span class="text-sm font-semibold text-slate-800 group-hover:text-primary">RM Crânio Normal</span>
        <span class="material-symbols-outlined text-slate-300 text-lg opacity-0 group-hover:opacity-100 transition-opacity">keyboard_return</span>
      </div>
      <p class="text-xs text-slate-500 mt-0.5 line-clamp-1">Exame sem alterações significativas. Parênquima cerebral de morfologia...</p>
    </button>
    <button class="w-full text-left px-4 py-3 hover:bg-primary/5 transition-colors group">
      <div class="flex items-center justify-between">
        <span class="text-sm font-semibold text-slate-800 group-hover:text-primary">RM Crânio - Sinusite</span>
        <span class="material-symbols-outlined text-slate-300 text-lg opacity-0 group-hover:opacity-100 transition-opacity">keyboard_return</span>
      </div>
      <p class="text-xs text-slate-500 mt-0.5 line-clamp-1">Espessamento mucoso nos seios maxilares bilateral...</p>
    </button>
    <button class="w-full text-left px-4 py-3 hover:bg-primary/5 transition-colors group">
      <div class="flex items-center justify-between">
        <span class="text-sm font-semibold text-slate-800 group-hover:text-primary">RM Coluna Normal</span>
        <span class="material-symbols-outlined text-slate-300 text-lg opacity-0 group-hover:opacity-100 transition-opacity">keyboard_return</span>
      </div>
      <p class="text-xs text-slate-500 mt-0.5 line-clamp-1">Corpos vertebrais de altura e sinal preservados...</p>
    </button>

    <!-- Tomografia -->
    <div class="px-4 pt-3 pb-1">
      <span class="text-[11px] font-bold uppercase tracking-wider text-slate-400">Tomografia</span>
    </div>
    <button class="w-full text-left px-4 py-3 hover:bg-primary/5 transition-colors group">
      <div class="flex items-center justify-between">
        <span class="text-sm font-semibold text-slate-800 group-hover:text-primary">TC Tórax Normal</span>
        <span class="material-symbols-outlined text-slate-300 text-lg opacity-0 group-hover:opacity-100 transition-opacity">keyboard_return</span>
      </div>
      <p class="text-xs text-slate-500 mt-0.5 line-clamp-1">Campos pulmonares expandidos, sem consolidações...</p>
    </button>
    <button class="w-full text-left px-4 py-3 hover:bg-primary/5 transition-colors group">
      <div class="flex items-center justify-between">
        <span class="text-sm font-semibold text-slate-800 group-hover:text-primary">TC Abdome Normal</span>
        <span class="material-symbols-outlined text-slate-300 text-lg opacity-0 group-hover:opacity-100 transition-opacity">keyboard_return</span>
      </div>
      <p class="text-xs text-slate-500 mt-0.5 line-clamp-1">Fígado de dimensões e contornos normais...</p>
    </button>

    <!-- Geral -->
    <div class="px-4 pt-3 pb-1">
      <span class="text-[11px] font-bold uppercase tracking-wider text-slate-400">Geral</span>
    </div>
    <button class="w-full text-left px-4 py-3 hover:bg-primary/5 transition-colors group">
      <div class="flex items-center justify-between">
        <span class="text-sm font-semibold text-slate-800 group-hover:text-primary">Rodapé Padrão</span>
        <span class="material-symbols-outlined text-slate-300 text-lg opacity-0 group-hover:opacity-100 transition-opacity">keyboard_return</span>
      </div>
      <p class="text-xs text-slate-500 mt-0.5 line-clamp-1">Laudado eletronicamente. Dr. [NOME] - CRM [NUMERO]</p>
    </button>
    <button class="w-full text-left px-4 py-3 hover:bg-primary/5 transition-colors group">
      <div class="flex items-center justify-between">
        <span class="text-sm font-semibold text-slate-800 group-hover:text-primary">Nota de Contraste</span>
        <span class="material-symbols-outlined text-slate-300 text-lg opacity-0 group-hover:opacity-100 transition-opacity">keyboard_return</span>
      </div>
      <p class="text-xs text-slate-500 mt-0.5 line-clamp-1">Exame realizado após administração endovenosa...</p>
    </button>
  </div>

  <div class="flex items-center justify-center gap-4 px-4 py-3 border-t border-slate-200 bg-slate-50/50">
    <span class="text-xs text-slate-400"><kbd class="px-1.5 py-0.5 rounded bg-slate-200/70 text-[10px] font-semibold text-slate-500 mr-1">Enter</kbd> para inserir</span>
    <span class="text-xs text-slate-400"><kbd class="px-1.5 py-0.5 rounded bg-slate-200/70 text-[10px] font-semibold text-slate-500 mr-1">Esc</kbd> para fechar</span>
  </div>
</div>

<script src="../../nav.js"></script>
</body>
</html>
